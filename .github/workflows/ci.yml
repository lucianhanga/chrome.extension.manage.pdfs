name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build extension
        run: pnpm build

      - name: Verify pdf.js worker is packaged
        run: |
          if ! ls dist/assets/pdf.worker*.mjs >/dev/null 2>&1; then
            echo "::error::pdf.js worker missing from dist/assets — the extension will hang on PDF load."
            exit 1
          fi
          echo "pdf.js worker present in dist/assets."
