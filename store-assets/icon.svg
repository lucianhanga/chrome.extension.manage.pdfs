<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b95ff"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.5" flood-color="#0a1840" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Back sheet (suggests multiple/merged documents) -->
  <rect x="34" y="28" width="52" height="66" rx="7" fill="#dbe6ff" transform="rotate(-9 60 61)" filter="url(#shadow)"/>

  <!-- Front sheet with folded corner -->
  <g filter="url(#shadow)">
    <path d="M44 30
             h28
             l16 16
             v46
             a7 7 0 0 1 -7 7
             h-37
             a7 7 0 0 1 -7 -7
             v-55
             a7 7 0 0 1 7 -7 z" fill="#ffffff"/>
    <!-- Folded corner -->
    <path d="M72 30 l16 16 h-12 a4 4 0 0 1 -4 -4 z" fill="#b9cdf2"/>
  </g>

  <!-- Red PDF accent bar -->
  <rect x="41" y="74" width="46" height="13" rx="3.5" fill="#e0382b"/>
  <!-- Content lines -->
  <rect x="41" y="56" width="38" height="6" rx="3" fill="#9fb4d6"/>
  <rect x="41" y="65" width="30" height="6" rx="3" fill="#c2cfe6"/>
</svg>
